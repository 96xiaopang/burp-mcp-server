name: Build Burp Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build with Gradle
      working-directory: ./burp-extension
      run: gradle shadowJar

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: burp-mcp-extension
        path: burp-extension/build/libs/*-all.jar
