name: Release Burp Extension

on:
  push:
    tags:
      - 'v*.*.*'  # 只有推送带有 v 开头的 tag 时才触发 Release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build with Gradle
      working-directory: ./burp-extension
      run: gradle shadowJar

    - name: Upload Build Artifact (Optional)
      uses: actions/upload-artifact@v4
      with:
        name: burp-mcp-extension
        path: burp-extension/build/libs/*.jar

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: burp-extension/build/libs/*.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
